services:
  backend:
    environment:
      DATABASE_URL: postgresql://sorveteria:sorveteria@postgres:5432/sorveteria_pos
      REDIS_URL: redis://redis:6379
      DB_CONN_MAX_AGE: 300
      DB_CONNECT_TIMEOUT: 3
    depends_on:
      - postgres
      - redis

  backups:
    environment:
      DATABASE_URL: postgresql://sorveteria:sorveteria@postgres:5432/sorveteria_pos
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: sorveteria_pos
      POSTGRES_USER: sorveteria
      POSTGRES_PASSWORD: sorveteria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
