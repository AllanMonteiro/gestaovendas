services:
  # 1. Backend: Web Service do Django
  - type: web
    name: gestaovendas-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "chmod +x render-build.sh render-start.sh && ./render-build.sh"
    startCommand: "./render-start.sh"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: "postgresql://postgres.ihvnpkdtgcvkcskjkmmh:Sorveteria240520@aws-1-sa-east-1.pooler.supabase.com:6543/postgres?sslmode=require"
      - key: DEBUG
        value: "0"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gestaovendas-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://gestaovendas-frontend.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: REQUIRE_AUTH
        value: "1"
      - key: DB_CONN_MAX_AGE
        value: "0"
      
      # 🤖 New AI & WhatsApp Features
      - key: AI_PROVIDER
        value: "gemini" # ou "openai"
      - key: AI_MODEL
        value: "gemini-1.5-flash"
      - key: AI_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false

  # 2. Frontend: Site Estático (Modernizado)
  - type: web
    name: gestaovendas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://gestaovendas-backend.onrender.com"
      - key: VITE_WS_URL
        value: "wss://gestaovendas-backend.onrender.com"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
