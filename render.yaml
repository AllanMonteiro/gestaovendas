services:
  # 1. Backend: Web Service do Django
  - type: web
    name: gestaovendas-backend
    env: python
    rootDir: backend
    buildCommand: "./render-build.sh"
    startCommand: "./render-start.sh"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: "postgresql://postgres:Sorveteria2026@db.ihvnpkdtgcvkcskjkmmh.supabase.co:5432/postgres"
      - key: DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gestaovendas-frontend.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: REQUIRE_AUTH
        value: "1"

  # 2. Frontend: site stático do Vite/React
  - type: web
    name: gestaovendas-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: "https://gestaovendas-backend.onrender.com"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
