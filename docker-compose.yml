version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: sorveteria_pos
      POSTGRES_USER: sorveteria
      POSTGRES_PASSWORD: sorveteria
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sorveteria -d sorveteria_pos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: django_backend
    restart: always
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: sorveteria_pos
      POSTGRES_USER: sorveteria
      POSTGRES_PASSWORD: sorveteria
      REQUIRE_AUTH: 0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_BACKEND: redis
      CACHE_TIMEOUT: 300
      DJANGO_DEBUG: 1
      DJANGO_ALLOWED_HOSTS: "*"
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8001:8000"
    command: >
      bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata:
