version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: sorveteria_pos
      POSTGRES_USER: sorveteria
      POSTGRES_PASSWORD: sorveteria
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    image: python:3.11
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sorveteria_pos
      POSTGRES_USER: sorveteria
      POSTGRES_PASSWORD: sorveteria
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DJANGO_DEBUG: 1
      DJANGO_ALLOWED_HOSTS: "*"
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      bash -c "pip install -r requirements.txt && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata:
